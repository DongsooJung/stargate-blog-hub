name: Pages 헬스체크

# ┌───────────────────────────────────────────────────────────────┐
# │ GitHub Pages 배포 후 blog.stargateedu.co.kr 가 200 OK 를          │
# │ 반환하는지, HTTPS 리다이렉트가 적용되었는지 주 1회 점검합니다.  │
# │ 실패 시 GitHub Issue 를 자동 생성합니다.                        │
# └───────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: '30 0 * * 1'    # 매주 월 UTC 00:30 → KST 09:30
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    name: 도메인 · SSL · 응답 검증
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: curl 헬스체크
        id: check
        run: |
          set +e
          URL="https://blog.stargateedu.co.kr/"
          STATUS=$(curl -sS -o /tmp/body.html -w "%{http_code}" -L --max-time 15 "$URL")
          SIZE=$(stat -c%s /tmp/body.html 2>/dev/null || echo 0)
          SSL=$(curl -sSI --max-time 10 "$URL" | grep -ic 'strict-transport-security' || true)
          echo "status=$STATUS"  >> $GITHUB_OUTPUT
          echo "size=$SIZE"      >> $GITHUB_OUTPUT
          echo "hsts=$SSL"       >> $GITHUB_OUTPUT
          echo "::notice::HTTP $STATUS · ${SIZE}B · HSTS=$SSL"
          test "$STATUS" = "200"

      - name: 실패 시 Issue 생성
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 허브 다운 감지 — ${new Date().toISOString().slice(0,16)}`;
            const body  = [
              '## blog.stargateedu.co.kr 헬스체크 실패',
              '',
              `- HTTP 상태: **${{ steps.check.outputs.status }}**`,
              `- 응답 크기: **${{ steps.check.outputs.size }} B**`,
              `- HSTS 헤더: **${{ steps.check.outputs.hsts }}**`,
              '',
              '### 점검 순서',
              '1. Settings → Pages → 배포 상태',
              '2. DNS: `dig blog.stargateedu.co.kr +short`',
              '3. Cafe24 DNS 의 `blog` CNAME 레코드 확인',
              '4. GitHub Actions: 최근 "허브 RSS 자동갱신" 실행 로그',
            ].join('\n');
            await github.rest.issues.create({
              ...context.repo, title, body,
              labels: ['production', 'urgent', 'hub-down']
            });
