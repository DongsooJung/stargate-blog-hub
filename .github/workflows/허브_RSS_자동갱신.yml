name: 허브 RSS 자동갱신

# ┌──────────────────────────────────────────────────────────────────┐
# │ 매일 한국시간 03:00 에 4개 채널 RSS 를 수집하여 index.html 의      │
# │ "최신 포스팅 20개" 섹션을 자동 업데이트합니다.                      │
# │ - Cron UTC 18:00 == KST 03:00                                    │
# │ - workflow_dispatch 로 수동 트리거 가능                            │
# │ - 변경이 있을 때만 커밋 (noop 방지)                                │
# │ - GitHub Pages 가 동일 브랜치에서 자동 배포됨                       │
# └──────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: '0 18 * * *'     # UTC → KST 03:00
  workflow_dispatch:          # 수동 실행 버튼
  push:
    paths:
      - 'scripts/build_hub_index.py'
      - 'templates/**'
      - '.github/workflows/허브_RSS_자동갱신.yml'

permissions:
  contents: write             # 커밋 푸시 권한

concurrency:
  group: hub-rss-sync
  cancel-in-progress: false

jobs:
  sync:
    name: RSS 수집 및 index.html 갱신
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 리포 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: 허브 인덱스 빌드
        id: build
        env:
          TZ: Asia/Seoul
        run: |
          python scripts/build_hub_index.py
          echo "posts=$(python -c "import re,pathlib; m=re.search(r'data-post-count=\"(\d+)\"', pathlib.Path('index.html').read_text(encoding='utf-8')); print(m.group(1) if m else 0)")" >> $GITHUB_OUTPUT

      - name: 변경 사항 확인
        id: diff
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "::notice::변경 사항 없음 — 커밋 생략"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 커밋 및 푸시
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  'stargate-hub-bot'
          git config user.email 'bot@stargate11.com'
          git add index.html
          git commit -m "chore(hub): RSS 자동 갱신 — 최신 글 ${{ steps.build.outputs.posts }}개 ($(date -u +'%Y-%m-%d %H:%MZ'))"
          git push

      - name: 요약 출력
        run: |
          echo "### 허브 RSS 갱신 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 최신 포스팅: **${{ steps.build.outputs.posts }}개**" >> $GITHUB_STEP_SUMMARY
          echo "- 변경 여부: **${{ steps.diff.outputs.changed }}**" >> $GITHUB_STEP_SUMMARY
          echo "- 실행 시각: **$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')**" >> $GITHUB_STEP_SUMMARY
          echo "- 배포 URL: https://blog.stargate11.com/" >> $GITHUB_STEP_SUMMARY
